name: Build Tkinter EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Build com PyInstaller
        run: |
          pyinstaller --clean --noconfirm main_interface_win.spec

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: SincronizadorLoja7-Windows
          path: dist/SincronizadorLoja7.exe
          retention-days: 30
