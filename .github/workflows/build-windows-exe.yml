name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Create venv + install deps
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt

      - name: Build (PyInstaller)
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m PyInstaller --clean --noconfirm main_interface_win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SincronizadorLoja7-windows
          path: |
            dist/SincronizadorLoja7.exe
            dist/SincronizadorLoja7
